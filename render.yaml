services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: dome-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dome-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://dome-kiosk.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: REDIS_URL
        value: ""          # set to a Redis URL if you need Celery background tasks
      - key: UPI_ID
        value: hotel@upi   # update to your real UPI ID
      - key: UPI_PAYEE_NAME
        value: Hotel Reception
      - key: STORAGE_PATH
        value: /tmp/storage
      - key: ID_PURGE_DAYS
        value: "30"
      - key: KIOSK_INACTIVITY_SECONDS
        value: "60"
      - key: BOOKING_HOLD_MINUTES
        value: "30"
      - key: MQTT_HOST
        value: 01cf8c0bc44147c0a0e333bdb59688ed.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USERNAME
        value: dome-backend
      - key: MQTT_PASSWORD
        sync: false        # fill in Render dashboard — do not commit
      - key: MQTT_TLS
        value: "true"
      - key: MQTT_TOPIC_PREFIX
        value: dome/room
      - key: ROOM_UNLOCK_MINUTES
        value: "5"
      - key: AISENSY_API_KEY
        sync: false        # fill in Render dashboard
      - key: AISENSY_USER_NAME
        value: Hotel Reception
      - key: AISENSY_CAMPAIGN_CHECKIN
        value: checkin_confirmation
      - key: AISENSY_CAMPAIGN_CHECKOUT_REMINDER
        value: checkout_reminder
      - key: AISENSY_CAMPAIGN_PAYMENT
        value: payment_receipt
      - key: AISENSY_CAMPAIGN_NEW_BOOKING
        value: new_booking_alert
      - key: AISENSY_CAMPAIGN_OVERSTAY
        value: overstay_alert
      - key: AISENSY_ADMIN_PHONE
        value: "918966051698"
      - key: MSG91_AUTH_KEY
        sync: false        # fill in Render dashboard
      - key: MSG91_CHECKIN_SUCCESS_FLOW
        sync: false        # fill in Render dashboard
      - key: MSG91_CHECKIN_FAILED_FLOW
        sync: false        # fill in Render dashboard
      - key: MSG91_SENDER_ID
        value: HOTEL
      - key: MSG91_ADMIN_PHONE
        value: "918966051698"
      - key: FIREBASE_PROJECT_ID
        value: dome-kiosk
      - key: FIREBASE_CREDENTIALS_PATH
        value: ""
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: ""

  # ── React / Vite frontend (static site) ────────────────────────────────────
  - type: web
    name: dome-kiosk
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://dome-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL database ───────────────────────────────────────────────────────
databases:
  - name: dome-db
    databaseName: dome
    plan: free
